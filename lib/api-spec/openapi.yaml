openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EduBharat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to Claude AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AiChatInput:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
        maxTokens:
          type: ["integer", "null"]
        system:
          type: ["string", "null"]

    AiChatResult:
      type: object
      required:
        - text
      properties:
        text:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

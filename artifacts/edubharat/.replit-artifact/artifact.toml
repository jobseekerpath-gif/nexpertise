kind = "web"
previewPath = "/"
title = "EduBharat"
version = "1.0.0"
id = "artifacts/edubharat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18855

[services.development]
run = "pnpm --filter @workspace/edubharat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edubharat", "run", "build" ]
publicDir = "artifacts/edubharat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18855"
BASE_PATH = "/"

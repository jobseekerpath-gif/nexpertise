kind = "mobile"
previewPath = "/mobile/"
title = "EduBharat Mobile"
version = "1.0.0"
id = "artifacts/edubharat-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 22793

[services.development]
run = "pnpm --filter @workspace/edubharat-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edubharat-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/edubharat-mobile", "run", "serve" ]

[services.env]
PORT = "22793"
BASE_PATH = "/mobile/"
